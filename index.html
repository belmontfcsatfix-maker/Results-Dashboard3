<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belmont FC – Saturday Fixtures Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --blue:   #0a1d37;
  --blue2:  #162f52;
  --yellow: #fdb813;
  --dark:   #050d1a;
  --card:   #0c1f3d;
  --text:   #f0f4f8;
  --muted:  #8ba2c1;
  --border: rgba(253,184,19,0.15);
  --green:  #2ecc71;
  --red:    #e74c3c;
  --amber:  #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--dark); font-family:'DM Sans',sans-serif; color:var(--text); min-height:100vh; overflow-x:hidden; }

/* HEADER & LOGO */
.header { padding:20px; border-bottom:2px solid var(--yellow); display:flex; align-items:center; gap:18px; background:var(--blue); }
.logo-img { height: 60px; width: auto; }
.club-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.02em; line-height:1; }
.club-title span { color:var(--yellow); }

/* TABLE STYLING */
.twrap-outer { padding:20px; }
.twrap { border-radius:12px; border:1px solid var(--border); overflow-x:auto; background:var(--card); }
table { width:100%; border-collapse:collapse; font-size:0.85rem; min-width:800px; }
thead tr { background:var(--blue2); }
thead th { padding:13px 15px; text-align:left; font-size:0.6rem; font-weight:700; text-transform:uppercase; color:var(--yellow); border-bottom:1px solid var(--border); }
td { padding:12px 15px; border-bottom:1px solid rgba(255,255,255,0.04); }

/* Updated Division Style */
.divcol { font-weight:700; color:var(--yellow); font-size:0.82rem; }
.kocol { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--muted); }

@media (max-width:600px) {
  .header { flex-direction: column; align-items: flex-start; }
  .logo-img { height: 50px; }
}
</style>
</head>
<body>

<div class="header">
  <img class="logo-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA5AAAASVCAYAAADaJjEZ..." alt="Belmont FC Logo">
  <div>
    <div class="club-title">BELMONT <span>FC</span></div>
    <div style="font-size:0.7rem; text-transform:uppercase; color:var(--yellow); font-weight:600;">Saturday Fixtures Dashboard</div>
  </div>
</div>

<div class="twrap-outer">
  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th>KO Time</th>
          <th>Age Group</th>
          <th>Division</th>
          <th>Home Team</th>
          <th>Score</th>
          <th>Away Team</th>
          <th>Venue</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>
</div>

<script>
  // Mock Data for Demo (Usually loaded from your CSV)
  const fixtures = [
    { ko: "10:30", age: "U12", div: "Div 1", home: "Belmont FC", score: "3 - 1", away: "Rival FC", venue: "Home Ground" }
  ];

  function renderTable() {
    const body = document.getElementById('tableBody');
    body.innerHTML = fixtures.map(f => `
      <tr>
        <td class="kocol">${f.ko || 'N/A'}</td> <td style="font-family:'Bebas Neue', sans-serif;">${f.age}</td>
        <td class="divcol">${f.div}</td> <td style="color:var(--yellow); font-weight:bold;">${f.home}</td>
        <td><span style="border:1px solid var(--yellow); padding:2px 8px; border-radius:5px;">${f.score}</span></td>
        <td>${f.away}</td>
        <td style="font-size:0.75rem; color:var(--muted);">${f.venue}</td>
      </tr>
    `).join('');
  }

  renderTable();
</script>

</body>
</html>
